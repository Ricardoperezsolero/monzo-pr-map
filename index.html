<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ricardo Perez-Solero · PR Expansion Map for Monzo</title>
  <meta name="description" content="An interactive map of PR and communications work across European markets, built for Monzo's PR Manager, Expansion Markets role.">
  <link rel="icon" type="image/png" href="Monzo%20favicon.png">
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --coral: #FF4136;
      --coral-light: rgba(255,65,54,0.12);
      --dark: #14151A;
      --panel-bg: #ffffff;
      --text: #1A1A2E;
      --muted: #6B7280;
      --border: #E5E7EB;
      --header-h: 52px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--dark);
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--header-h);
      background: var(--dark);
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px;
      border-bottom: 2px solid var(--coral);
    }
    #header-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--coral);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }
    #header-name {
      font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.01em;
    }
    #header-sep { color: rgba(255,255,255,0.2); font-size: 14px; }
    #header-title {
      font-size: 11px; color: var(--coral); letter-spacing: 0.07em;
      text-transform: uppercase; font-weight: 600;
    }
    #header-links {
      margin-left: auto; display: flex; gap: 14px; align-items: center;
    }
    #header-links a {
      color: rgba(255,255,255,0.55); font-size: 12px; text-decoration: none;
      transition: color 0.2s; font-weight: 500;
    }
    #header-links a:hover { color: var(--coral); }

    /* ── Map ── */
    #map {
      position: fixed;
      top: var(--header-h); left: 0; right: 0; bottom: 0;
      transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    body.panel-open #map { right: 340px; }

    /* ── Pins ── */
    .pin-wrap {
      position: absolute; top: 0; left: 0; cursor: pointer; width: 14px; height: 14px;
    }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--coral);
      border: 2.5px solid #fff;
      box-shadow: 0 2px 10px rgba(255,65,54,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .pin-wrap:hover .pin-dot,
    .pin-dot.active {
      transform: scale(1.4);
      box-shadow: 0 0 0 5px rgba(255,65,54,0.2), 0 4px 14px rgba(255,65,54,0.5);
    }
    .pin-label {
      position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
      background: rgba(20,21,26,0.88);
      color: #fff;
      font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px; white-space: nowrap;
      backdrop-filter: blur(4px);
      pointer-events: auto;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ── Card panel ── */
    #card-panel {
      position: fixed;
      top: var(--header-h); right: 0; bottom: 0;
      width: 340px;
      background: var(--panel-bg);
      box-shadow: -4px 0 30px rgba(0,0,0,0.15);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      z-index: 100;
      display: flex; flex-direction: column;
    }
    #card-panel.open { transform: translateX(0); }

    .card-header {
      background: var(--dark);
      padding: 22px 20px 18px;
      flex-shrink: 0;
    }
    .card-top-row {
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .card-flag { font-size: 30px; line-height: 1; margin-bottom: 10px; }
    .card-close {
      width: 28px; height: 28px; border-radius: 50%;
      border: none; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8);
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; flex-shrink: 0; margin-top: -2px;
    }
    .card-close:hover { background: rgba(255,255,255,0.22); }
    .card-market {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--coral); margin-bottom: 5px;
    }
    .card-client {
      font-size: 16px; font-weight: 700; color: #fff; line-height: 1.3;
      margin-bottom: 4px;
    }
    .card-period { font-size: 11px; color: rgba(255,255,255,0.45); }

    .card-scroll { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
    .card-body { padding: 20px; }

    .card-section { margin-bottom: 20px; }
    .card-section-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--coral); margin-bottom: 7px;
      display: flex; align-items: center; gap: 6px;
    }
    .card-section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .card-section-text {
      font-size: 13px; line-height: 1.65; color: #374151;
    }

    .card-result {
      background: #FFF5F4;
      border-left: 3px solid var(--coral);
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
      font-size: 13px; line-height: 1.65; color: #374151;
    }

    .card-metrics {
      display: flex; flex-direction: column; gap: 6px; margin-top: 12px;
    }
    .card-metric {
      display: flex; align-items: baseline; gap: 6px;
    }
    .metric-num {
      font-size: 18px; font-weight: 700; color: var(--coral); line-height: 1;
    }
    .metric-desc { font-size: 11px; color: var(--muted); }

    .card-also { display: flex; flex-direction: column; gap: 12px; }
    .also-item { padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .also-item:last-child { border-bottom: none; padding-bottom: 0; }
    .also-client {
      font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 3px;
    }
    .also-text { font-size: 12.5px; line-height: 1.55; color: #4B5563; }

    /* ── Bottom legend ── */
    #legend {
      position: fixed; bottom: 20px; left: 20px; z-index: 50;
      background: rgba(20,21,26,0.88);
      backdrop-filter: blur(8px);
      color: #fff; padding: 11px 16px; border-radius: 10px;
      border-left: 3px solid var(--coral);
      pointer-events: none;
    }
    #legend-title {
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--coral); margin-bottom: 3px;
    }
    #legend-sub { font-size: 9px; color: rgba(255,255,255,0.5); }

    /* ── MapLibre overrides ── */
    .maplibregl-ctrl-attrib { font-size: 9px !important; }
    .maplibregl-ctrl-bottom-right { bottom: 4px !important; right: 4px !important; }
    .maplibregl-ctrl-top-right { top: 60px !important; right: 10px !important; }
    .maplibregl-ctrl-group { box-shadow: 0 2px 12px rgba(0,0,0,0.15) !important; }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      body.panel-open #map { right: 0; }
      #card-panel {
        width: 100%; height: 65vh;
        top: auto; bottom: 0;
        transform: translateY(100%);
      }
      #card-panel.open { transform: translateY(0); }
      #header-title, #header-sep { display: none; }
      #header-name { font-size: 13px; }
      #legend { bottom: auto; top: 60px; }
    }

    /* Prevent browser zoom on panel content */
    #card-panel, #header, #legend { touch-action: pan-y; }
  </style>
</head>
<body>

<div id="header">
  <div id="header-avatar">RP</div>
  <div id="header-name">Ricardo Perez-Solero</div>
  <div id="header-sep">·</div>
  <div id="header-title">Communications &amp; PR Manager</div>
  <div id="header-links">
    <a href="https://www.ricardoperezsolero.com" target="_blank">Portfolio ↗</a>
    <a href="mailto:rpsolero@gmail.com">Email</a>
  </div>
</div>

<div id="map"></div>

<div id="card-panel">
  <div class="card-header">
    <div class="card-top-row">
      <div class="card-flag" id="cf"></div>
      <button class="card-close" id="card-close-btn" aria-label="Close">×</button>
    </div>
    <div class="card-market" id="cm"></div>
    <div class="card-client" id="cc"></div>
    <div class="card-period" id="cp"></div>
  </div>
  <div class="card-scroll">
    <div class="card-body">
      <div class="card-section">
        <div class="card-section-label">Challenge</div>
        <div class="card-section-text" id="c-challenge"></div>
      </div>
      <div class="card-section">
        <div class="card-section-label">Action</div>
        <div class="card-section-text" id="c-action"></div>
      </div>
      <div class="card-section">
        <div class="card-section-label">Result</div>
        <div class="card-result" id="c-result"></div>
      </div>
      <div class="card-metrics" id="c-metrics"></div>
      <div class="card-section" id="c-also-section" style="display:none; margin-top: 22px;">
        <div class="card-section-label">Also delivered here</div>
        <div class="card-also" id="c-also"></div>
      </div>
    </div>
  </div>
</div>

<div id="legend">
  <div id="legend-title">Built for Monzo · PR Manager, Expansion Markets</div>
  <div id="legend-sub">Click a pin to see campaign details</div>
</div>

<script>
const CAMPAIGNS = [
  {
    id: 'spain',
    coords: [-3.7038, 40.4168],
    label: 'Spain',
    flag: '🇪🇸',
    market: 'Spain · Madrid',
    client: 'Astara · Ogilvy',
    period: '2023 – 2024',
    challenge: 'A Spanish top-30 company by turnover was still mostly invisible outside its own industry, one month after announcing a rebrand into mobility-as-a-service, data intelligence and EVs, and preparing an IPO within the year.',
    action: 'Led a €150K integrated PR strategy at Ogilvy, shifting the brand from B2B to consumer-facing communications. Worked closely with Astara\'s data and research teams to translate mobility-intelligence data into concrete, human results (e.g. average service wait time cut from 30 to 15 minutes). Rebuilt the team\'s media targeting using AI-assisted analysis of journalist beats and past coverage, and pitched beyond automotive press into tech, lifestyle and business media.',
    result: '2,600+ media pieces generated within a year, a third of them in tier-one outlets · around 60% of coverage shifted to generalist and lifestyle media · stronger executive positioning ahead of IPO preparation',
    metrics: [
      { num: '2,600+', desc: 'media pieces in year one' },
      { num: '€7.3B', desc: 'estimated advertising value' },
      { num: '60%', desc: 'coverage in generalist/lifestyle media' }
    ],
    also: [
      { client: 'EcoLab', text: 'Strategic content for Ogilvy: op-eds and in-depth features placed in Spain\'s tier-one media.' },
      { client: 'Minsait', text: 'Translated the launch of Minsait\'s Phygital division into a press-ready narrative for tech and business media.' },
      { client: 'Accumin', text: 'Led content and copy strategy for Tinsa Group\'s rebrand into Accumin.' },
      { client: 'Zespri', text: 'Strategy and content consultancy for global campaign releases, adapting messaging for local market rollout.' }
    ]
  },
  {
    id: 'germany',
    coords: [9.9937, 53.5753],
    label: 'Germany',
    flag: '🇩🇪',
    market: 'Germany · Global energy comms',
    client: 'Siemens Gamesa',
    period: '2022 – 2026',
    challenge: 'A global renewable energy business needed its digital content and publishing infrastructure to work consistently across every market it operates in, following a CMS migration, without losing SEO performance or editorial governance along the way.',
    action: 'Managed the Adobe Experience Manager implementation following migration from Sitecore, optimising content structures for SEO and UX across the global site. Integrated the Aprimo digital asset management system and defined publishing workflows aligned with the company\'s governance needs across markets.',
    result: 'A CMS and asset-management infrastructure built to hold up across multiple markets and languages, with SEO performance protected through the migration and a repeatable publishing workflow adopted by the wider team.',
    metrics: []
  },
  {
    id: 'portugal',
    coords: [-9.1393, 38.7169],
    label: 'Portugal',
    flag: '🇵🇹',
    market: 'Portugal · Multi-market Europe',
    client: 'Rovensa Next',
    period: '2023 – 2024',
    challenge: 'Scale a sustainable-agriculture campaign across several European markets at once, each with its own audience, trade media ecosystem and regulatory context, without losing one coherent brand narrative.',
    action: 'Coordinated with international teams at Ogilvy to adapt messaging and PR materials market by market, from a globally wire-syndicated launch story to an in-person press conference and trade-show activation for the Iberian market at Fruit Attraction. Supervised trade and business media outreach across multiple countries in parallel.',
    result: 'The global launch reached 169M+ unique visitors across 15 countries, from the Americas to Southeast Asia, for €1.49M in estimated ad value. The Iberian trade launch at Fruit Attraction alone added a further 27M+ in reach across Spanish and Portuguese national and trade press.',
    metrics: [
      { num: '€1.49M', desc: 'global ad value' },
      { num: '169M+', desc: 'global reach (UVMs)' },
      { num: '15', desc: 'countries reached' }
    ]
  },
  {
    id: 'unep',
    coords: [6.1432, 46.2044],
    label: 'Switzerland',
    flag: '🌍',
    market: 'International · Geneva',
    client: 'UNEP',
    period: '2020 – present',
    challenge: 'Turn genuinely complex environmental science (the collapse and legal-personhood case of Spain\'s Mar Menor lagoon, driven by eutrophication and anoxia) into a documentary that scientists, policymakers and general audiences could all follow, without oversimplifying it.',
    action: 'Produced UNEP\'s Restore series episode on the Mar Menor end-to-end: researched the science with the Instituto Español de Oceanografía and the University of Murcia, chose which characters and threads carried the story and shaped interviews with scientists, activists and locals into sound bites that were both accurate and accessible.',
    result: 'The film passed one million views on YouTube, was picked up across Spanish media and landed at a politically sensitive moment for Spain\'s restoration agenda, without compromising scientific integrity under ministry feedback.',
    metrics: [
      { num: '1M+', desc: 'YouTube views' }
    ]
  },
  {
    id: 'colonies',
    coords: [2.3522, 48.8566],
    label: 'France',
    flag: '🇫🇷',
    market: 'France · Paris',
    client: 'Colonies · Waka Coliving',
    period: '2025',
    challenge: 'Colonies, a French coliving operator, was launching its first-ever property in Spain (Waka, a 79-room building in Madrid\'s Tetuán district) with zero brand recognition in a brand-new market and no existing press or influencer relationships to build on.',
    action: 'Ran the full press office for the Spanish launch: press release, press calls and save-the-date outreach across national real-estate press and hyperlocal Tetuán media. Paired it with an influencer partnership and a co-branded launch event, working with Tom Hopcroft (@Guirisdemierda, "Guiris de Mierda") to reach the property\'s target renter audience directly.',
    result: '8 media placements (Idealista, El Español, EjePrime, Economía Digital, BrainsRe, elDiario.es and Tetuán 30 días) for €578K in estimated ad value and 35.7M in reach. The influencer campaign added 28,452 views and 880 sticker taps, and the co-branded launch event drew around 100 attendees.',
    metrics: [
      { num: '€578K', desc: 'estimated advertising value' },
      { num: '35.7M', desc: 'media reach (OTS)' },
      { num: '100', desc: 'launch event attendees' }
    ]
  },
  {
    id: 'monzo-uk',
    coords: [-0.1276, 51.5074],
    label: 'United Kingdom',
    flag: '🇬🇧',
    market: 'United Kingdom · London',
    client: 'Monzo',
    period: '2026 →',
    challenge: 'Monzo just opened in Spain (its second EU market after Ireland) with offices in Madrid and Barcelona; a plan to listen before building; and Revolut, N26 and Openbank already there first. Zero brand recognition, in a market that already picked its winners.',
    action: 'That\'s the part I\'m built for. An established brand\'s quiet news cycle is easy. As a correspondent, I often started from zero in new countries and quickly found myself competing with the best journalists. This case will be no different: only this time, I\'m on home turf.',
    result: 'This pin doesn\'t have a result yet. It\'s the one entry on this map still waiting to be written.',
    metrics: []
  }
];

// ── Map init ──
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  center: [8, 50],
  zoom: 4.0,
  minZoom: 2,
  maxZoom: 13,
  pitchWithRotate: false,
  dragRotate: false
});

map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');

function fitToCampaigns() {
  const bounds = new maplibregl.LngLatBounds();
  CAMPAIGNS.forEach(c => bounds.extend(c.coords));
  const isMobile = window.innerWidth < 680;
  map.fitBounds(bounds, {
    padding: isMobile
      ? { top: 90, bottom: 90, left: 40, right: 40 }
      : { top: 40, bottom: 100, left: 90, right: 380 },
    duration: 0
  });
}

window.addEventListener('resize', () => { map.resize(); fitToCampaigns(); });
requestAnimationFrame(() => { map.resize(); fitToCampaigns(); });

// ── Zoom prevention on header/panel ──
document.addEventListener('wheel', function(e) {
  if (e.ctrlKey && !e.target.closest('#map')) e.preventDefault();
}, { passive: false });
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && ['=', '+', '-', '0'].includes(e.key)) e.preventDefault();
});

// ── Card logic ──
let activePin = null;
const panel = document.getElementById('card-panel');

function openCard(campaign, pinEl) {
  document.getElementById('cf').textContent = campaign.flag;
  document.getElementById('cm').textContent = campaign.market;
  document.getElementById('cc').textContent = campaign.client;
  document.getElementById('cp').textContent = campaign.period;
  document.getElementById('c-challenge').textContent = campaign.challenge;
  document.getElementById('c-action').textContent = campaign.action;
  document.getElementById('c-result').textContent = campaign.result;

  const metricsEl = document.getElementById('c-metrics');
  metricsEl.innerHTML = campaign.metrics.map(m =>
    `<div class="card-metric">
      <span class="metric-num">${m.num}</span>
      <span class="metric-desc">${m.desc}</span>
    </div>`
  ).join('');

  const alsoSection = document.getElementById('c-also-section');
  const alsoEl = document.getElementById('c-also');
  if (campaign.also && campaign.also.length) {
    alsoEl.innerHTML = campaign.also.map(a =>
      `<div class="also-item">
        <div class="also-client">${a.client}</div>
        <div class="also-text">${a.text}</div>
      </div>`
    ).join('');
    alsoSection.style.display = '';
  } else {
    alsoSection.style.display = 'none';
  }

  if (activePin) activePin.querySelector('.pin-dot').classList.remove('active');
  activePin = pinEl;
  pinEl.querySelector('.pin-dot').classList.add('active');

  panel.classList.add('open');
  document.body.classList.add('panel-open');
}

function closeCard() {
  panel.classList.remove('open');
  document.body.classList.remove('panel-open');
  if (activePin) { activePin.querySelector('.pin-dot').classList.remove('active'); activePin = null; }
}

document.getElementById('card-close-btn').addEventListener('click', closeCard);
map.on('click', closeCard);

// ── Pins ──
// Markers only need the Map instance, not full tile load, so add them
// immediately rather than gating on 'load' (which waits on every visible tile).
CAMPAIGNS.forEach(campaign => {
    const el = document.createElement('div');
    el.className = 'pin-wrap';
    el.innerHTML = `<div class="pin-dot"></div><div class="pin-label">${campaign.label}</div>`;

    el.addEventListener('mousedown', e => e.stopPropagation());
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (activePin === el && panel.classList.contains('open')) { closeCard(); return; }
      openCard(campaign, el);
    });

    new maplibregl.Marker({ element: el, anchor: 'center' })
      .setLngLat(campaign.coords)
      .addTo(map);
});
</script>
</body>
</html>
